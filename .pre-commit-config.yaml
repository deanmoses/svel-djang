repos:
  # Security + basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: no-commit-to-branch
        args: ['--branch', 'main']
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
        exclude: '\.md$'
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Local hooks (use system Node to avoid nodeenv/Node 24 incompatibility)
  - repo: local
    hooks:
      # Markdown — formatting + linting.
      # Invoke the binaries installed in frontend/node_modules directly so
      # versions stay pinned by frontend/package.json + pnpm-lock.yaml
      # (instead of re-downloading via npx on every run).
      - id: prettier-markdown
        name: prettier (markdown)
        entry: frontend/node_modules/.bin/prettier --write
        language: system
        types: [markdown]
        exclude: ^(CLAUDE|AGENTS)\.md$
      - id: markdownlint-cli2
        name: markdownlint-cli2
        entry: frontend/node_modules/.bin/markdownlint-cli2
        language: system
        types: [markdown]
        exclude: ^(CLAUDE\.md|AGENTS\.md|docs/plans/.*)$
      # Python (backend) — use project's ruff via uv so pre-commit and CI
      # always run the identical binary (avoids platform formatting drift).
      # pass_filenames: false so ruff checks all backend files every time,
      # catching formatting issues from earlier commits too.
      # check --fix and format are combined into a single uv invocation to
      # avoid paying uv's cold-start cost twice.
      - id: ruff
        name: ruff check + format
        entry: bash -c 'cd backend && uv run ruff check --fix . && uv run ruff format .'
        language: system
        files: ^backend/
        pass_filenames: false
      # Static type checking via basedpyright. A baseline at
      # backend/.basedpyright/baseline.json captures known-accepted findings
      # from the initial adoption; the hook only fails on *new* errors.
      # Regenerate with `cd backend && uv run basedpyright --writebaseline`.
      - id: basedpyright
        name: basedpyright
        entry: bash -c 'cd backend && uv run basedpyright'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

  # Secret detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: '(pnpm-lock\.yaml|uv\.lock)$'

  - repo: local
    hooks:
      # Auto-regenerate agent docs when source or build script changes
      - id: agent-docs-regen
        name: regenerate agent docs
        entry: bash -c 'python3 scripts/build_agent_docs.py && git add CLAUDE.md AGENTS.md'
        language: system
        files: ^(docs/AGENTS\.src\.md|scripts/build_agent_docs\.py)$
        pass_filenames: false

      # Block direct edits to generated agent docs (unless source or script also changed)
      - id: agent-docs-no-direct-edit
        name: check agent docs not edited directly
        entry: scripts/check_agent_docs_edit.sh
        language: script
        files: ^(CLAUDE|AGENTS)\.md$
        pass_filenames: false

      # Frontend lint + type check
      - id: frontend-lint
        name: frontend lint
        entry: bash -c 'cd frontend && pnpm lint'
        language: system
        files: ^frontend/
        pass_filenames: false
      - id: frontend-check
        name: frontend type check
        entry: bash -c 'cd frontend && pnpm check'
        language: system
        files: ^frontend/
        pass_filenames: false
      - id: frontend-test
        name: frontend tests
        entry: bash -c 'cd frontend && pnpm test'
        language: system
        files: ^frontend/
        pass_filenames: false
      - id: backend-test
        name: backend tests
        entry: uv run --directory backend pytest
        language: system
        files: ^backend/
        pass_filenames: false
